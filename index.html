<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>サッカーノートメモ</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700;900&display=swap');

  :root {
    --bg: #ffffff;
    --text: #000000;
    --text-sub: #666666;
    --text-light: #999999;
    --border: #e0e0e0;
    --green: #00874a;
    --green-bg: #e8f5ef;
    --orange: #d4380d;
    --orange-bg: #fef0ec;
    --nav-height: 56px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh;
    padding-bottom: calc(var(--nav-height) + 16px);
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
  }

  /* ===== HEADER ===== */
  header {
    background: #000; padding: 14px 20px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .logo {
    font-size: 16px; font-weight: 900; color: #fff;
    letter-spacing: 1.5px; text-transform: uppercase;
  }
  .logo small {
    font-weight: 300; font-size: 10px; letter-spacing: 3px;
    display: block; margin-top: 1px; opacity: 0.5;
  }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .ver {
    font-size: 9px; color: rgba(255,255,255,0.4);
    letter-spacing: 2px; font-weight: 300;
  }
  .btn-reload {
    background: none; border: 1px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.6); padding: 4px 10px; border-radius: 2px;
    font-size: 11px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif;
    letter-spacing: 1px; transition: all 0.2s;
  }
  .btn-reload:hover { color: #fff; border-color: rgba(255,255,255,0.5); }

  /* ===== MAIN ===== */
  main { padding: 24px 20px; max-width: 720px; margin: 0 auto; }
  .section { display: none; }
  .section.active { display: block; }

  .section-title {
    font-size: 11px; font-weight: 700; letter-spacing: 3px;
    text-transform: uppercase; color: var(--text-light);
    margin-bottom: 20px; padding-bottom: 8px; border-bottom: 2px solid #000;
  }

  /* ===== SUB TABS ===== */
  .sub-tabs {
    display: flex; gap: 0; margin-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .sub-tab {
    padding: 10px 0; margin-right: 24px;
    font-size: 12px; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; cursor: pointer;
    color: var(--text-light); border: none; background: none;
    font-family: 'Noto Sans JP', sans-serif;
    border-bottom: 2px solid transparent; transition: all 0.2s;
    position: relative; top: 1px;
  }
  .sub-tab.active { color: #000; border-bottom-color: #000; }

  /* ===== FILTER ROW ===== */
  .filter-row {
    display: flex; gap: 6px; margin-bottom: 20px;
    overflow-x: auto; scrollbar-width: none;
  }
  .filter-row::-webkit-scrollbar { display: none; }
  .filter-btn {
    flex: 0 0 auto; padding: 5px 14px;
    border: 1.5px solid var(--border); border-radius: 2px;
    background: var(--bg); color: var(--text-sub);
    font-size: 11px; font-weight: 700; cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    letter-spacing: 0.5px; transition: all 0.2s;
  }
  .filter-btn.active {
    background: #000; color: #fff; border-color: #000;
  }

  /* ===== CARDS (timeline) ===== */
  .card-entry { padding: 20px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
  .card-entry:last-child { border-bottom: none; }
  .card-header {
    display: flex; align-items: baseline; gap: 12px; margin-bottom: 10px;
  }
  .card-date { font-size: 13px; font-weight: 700; letter-spacing: 0.5px; }
  .card-type {
    font-size: 10px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; padding: 3px 10px;
    border: 1.5px solid; border-radius: 2px;
  }
  .type-game { color: #000; border-color: #000; }
  .type-practice { color: var(--green); border-color: var(--green); }
  .type-school { color: var(--orange); border-color: var(--orange); }
  .card-title { font-size: 20px; font-weight: 900; margin-bottom: 12px; letter-spacing: -0.3px; }
  .card-note {
    font-size: 13px; color: var(--text-sub); margin-bottom: 10px;
    white-space: pre-wrap; line-height: 1.6;
  }

  /* ===== ITEM LIST ===== */
  .item-list { display: flex; flex-direction: column; gap: 6px; }
  .item-row {
    display: flex; align-items: flex-start; gap: 10px;
    font-size: 14px; padding: 10px 14px; border-radius: 4px; line-height: 1.6;
  }
  .item-row.tag-good { background: var(--green-bg); border-left: 3px solid var(--green); }
  .item-row.tag-improve { background: var(--orange-bg); border-left: 3px solid var(--orange); }
  .item-tag {
    flex-shrink: 0; font-size: 9px; font-weight: 700;
    letter-spacing: 1.5px; text-transform: uppercase;
    padding: 2px 6px; border-radius: 2px; color: #fff; margin-top: 3px;
  }
  .tag-good .item-tag { background: var(--green); }
  .tag-improve .item-tag { background: var(--orange); }
  .item-text { flex: 1; }

  /* ===== THEME CHIPS: inline after text ===== */
  .theme-chip {
    font-size: 9px; padding: 1px 6px; border-radius: 2px;
    font-weight: 700; letter-spacing: 0.3px;
    display: inline-block; margin-left: 4px; vertical-align: middle;
    line-height: 1.4;
  }
  .theme-pass { background: #d1e4f6; color: #1a56a0; }
  .theme-shoot { background: #f5d0d0; color: #a01a1a; }
  .theme-defense { background: #d5d0f5; color: #3a1aa0; }
  .theme-position { background: #c8f0e0; color: #0a6b42; }
  .theme-dribble { background: #f5e6c8; color: #8a5a0a; }
  .theme-trap { background: #e8d5f5; color: #6b1aa0; }
  .theme-mental { background: #f7d0dc; color: #8a1a42; }
  .theme-throwin { background: #c8f5d5; color: #1a6a28; }
  .theme-switch { background: #f5dcc8; color: #8a3a0a; }
  .theme-physical { background: #c8e0f5; color: #0a4a8a; }
  .theme-other { background: #e8e8e8; color: #555555; }

  /* ===== FORM CARD ===== */
  .card {
    background: #fff; padding: 20px;
    border: 1px solid var(--border); margin-bottom: 12px;
  }
  .form-group { margin-bottom: 16px; }
  .form-label {
    display: block; font-size: 10px; font-weight: 700;
    color: var(--text-light); margin-bottom: 6px;
    letter-spacing: 2px; text-transform: uppercase;
  }
  .form-input, .form-select, .form-textarea {
    width: 100%; padding: 10px 12px;
    border: 1px solid var(--border); border-radius: 2px;
    font-size: 14px; font-family: 'Noto Sans JP', sans-serif;
    background: #fff; color: var(--text); transition: border-color 0.2s;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    outline: none; border-color: #000;
  }
  .form-textarea { resize: vertical; min-height: 80px; line-height: 1.6; }

  .form-row { display: flex; gap: 12px; }
  .form-row .form-group { flex: 1; }

  .type-selector { display: flex; gap: 8px; }
  .type-option {
    flex: 1; padding: 10px 8px; text-align: center;
    border: 2px solid var(--border); border-radius: 2px;
    cursor: pointer; font-size: 12px; font-weight: 700;
    transition: all 0.2s; background: #fff;
    font-family: 'Noto Sans JP', sans-serif;
    letter-spacing: 0.5px;
  }
  .type-option.selected { border-color: #000; background: #000; color: #fff; }
  .type-option-label { display: block; }

  /* ===== ITEM FORM ===== */
  .items-form { margin-top: 8px; }
  .item-form-row {
    display: flex; gap: 8px; align-items: flex-start;
    margin-bottom: 8px; padding: 10px;
    background: #fafafa; border: 1px solid var(--border);
  }
  .item-form-main { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .item-form-text {
    width: 100%; padding: 8px 10px;
    border: 1px solid var(--border); border-radius: 2px;
    font-size: 13px; font-family: 'Noto Sans JP', sans-serif;
    background: #fff; resize: none;
    min-height: 38px; line-height: 1.5;
  }
  .item-form-text:focus { outline: none; border-color: #000; }
  .item-form-meta { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .tag-toggle-group { display: flex; gap: 0; }
  .tag-toggle {
    padding: 4px 10px; border: 1px solid var(--border);
    font-size: 11px; font-weight: 700; font-family: 'Noto Sans JP', sans-serif;
    background: #fff; cursor: pointer; color: var(--text-sub);
    transition: all 0.15s; letter-spacing: 0.5px;
  }
  .tag-toggle:first-child { border-radius: 2px 0 0 2px; }
  .tag-toggle:last-child { border-radius: 0 2px 2px 0; border-left: none; }
  .tag-toggle.active-good {
    background: var(--green); color: #fff; border-color: var(--green);
  }
  .tag-toggle.active-improve {
    background: var(--orange); color: #fff; border-color: var(--orange);
  }
  .theme-toggle {
    padding: 3px 7px; border-radius: 2px;
    border: 1px solid var(--border); background: #fff;
    font-size: 11px; cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    transition: all 0.15s;
  }
  .theme-toggle.selected {
    background: #000; border-color: #000;
    color: #fff; font-weight: 700;
  }
  .btn-remove-item {
    width: 28px; height: 28px; border-radius: 2px;
    border: none; background: var(--orange-bg); color: var(--orange);
    font-size: 16px; cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    margin-top: 6px;
  }
  .btn-add-item {
    width: 100%; padding: 10px;
    border: 2px dashed var(--border);
    background: transparent; color: var(--text-sub);
    font-size: 13px; font-weight: 700; cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    letter-spacing: 1px; transition: all 0.2s;
  }
  .btn-add-item:hover { border-color: #000; color: #000; }

  /* ===== BUTTONS ===== */
  .btn {
    padding: 12px 24px; border-radius: 2px;
    font-size: 14px; font-weight: 700; cursor: pointer;
    border: none; font-family: 'Noto Sans JP', sans-serif;
    transition: all 0.2s; letter-spacing: 0.5px;
  }
  .btn-primary { background: #000; color: #fff; width: 100%; }
  .btn-primary:hover { background: #333; }
  .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
  .btn-danger { background: var(--orange); color: #fff; }
  .btn-ghost {
    background: transparent; color: var(--text-sub);
    border: 1px solid var(--border); padding: 8px 16px;
  }
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .btn-row { display: flex; gap: 8px; margin-top: 16px; }
  .btn-row .btn { flex: 1; }

  /* ===== EMPTY STATE ===== */
  .empty-state {
    text-align: center; padding: 48px 16px; color: var(--text-sub);
  }
  .empty-state p { font-size: 14px; line-height: 1.6; }

  /* ===== TOAST ===== */
  #toast {
    position: fixed; bottom: calc(var(--nav-height) + 16px);
    left: 50%; transform: translateX(-50%) translateY(20px);
    background: #000; color: #fff;
    padding: 10px 20px; border-radius: 2px;
    font-size: 13px; font-weight: 700; letter-spacing: 0.5px;
    z-index: 200; opacity: 0; transition: all 0.3s; pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ===== OVERLAY / MODAL ===== */
  .overlay {
    position: fixed; inset: 0; z-index: 150;
    background: rgba(0,0,0,0.5);
    display: none; align-items: flex-end; justify-content: center;
  }
  .overlay.show { display: flex; }
  .modal {
    background: #fff; width: 100%; max-width: 720px; max-height: 85vh;
    overflow-y: auto; padding: 24px 20px;
    animation: slideUp 0.25s ease-out;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-title {
    font-size: 16px; font-weight: 900; margin-bottom: 16px;
    text-align: center; letter-spacing: 0.5px;
  }

  /* ===== REVIEW: THEME BAR ===== */
  .theme-bar-container { margin-bottom: 8px; }
  .theme-bar-row {
    display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
  }
  .theme-bar-label { font-size: 12px; width: 80px; flex-shrink: 0; text-align: right; font-weight: 700; }
  .theme-bar-track {
    flex: 1; height: 20px; background: #f5f5f5;
    overflow: hidden; display: flex;
  }
  .theme-bar-good { background: var(--green); height: 100%; }
  .theme-bar-improve { background: var(--orange); height: 100%; }
  .theme-bar-count { font-size: 11px; color: var(--text-sub); width: 30px; text-align: right; }

  /* ===== REVIEW: THEME SECTION ===== */
  .theme-section { margin-bottom: 20px; }
  .theme-header {
    display: flex; align-items: center; gap: 8px;
    font-size: 14px; font-weight: 900; margin-bottom: 10px;
    padding-bottom: 6px; border-bottom: 2px solid var(--border);
  }
  .theme-header-chip {
    font-size: 10px; padding: 2px 8px; border-radius: 2px;
    font-weight: 700;
  }
  .theme-count {
    margin-left: auto; font-size: 12px; color: var(--text-sub); font-weight: 500;
  }

  /* ===== REVIEW: REPEAT ===== */
  .repeat-card {
    background: var(--orange-bg); border-left: 3px solid var(--orange);
    padding: 12px 14px; margin-bottom: 10px;
  }
  .repeat-count {
    font-size: 10px; font-weight: 700; color: var(--orange);
    letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px;
  }
  .repeat-text { font-size: 13px; line-height: 1.5; }
  .repeat-dates { font-size: 11px; color: var(--text-sub); margin-top: 4px; }

  /* ===== SETTINGS ===== */
  .setting-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 0; border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .setting-label { font-size: 14px; font-weight: 700; }
  .setting-desc { font-size: 12px; color: var(--text-sub); margin-top: 2px; }

  /* ===== KIDS REVIEW OVERLAY ===== */
  .kids-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: #000; display: none; flex-direction: column;
    animation: fadeIn 0.3s;
  }
  .kids-overlay.show { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .kids-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px; color: #fff;
  }
  .kids-close {
    background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
    color: #fff; padding: 6px 14px; border-radius: 2px;
    font-size: 12px; font-weight: 700; cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif; letter-spacing: 1px;
  }
  .kids-title { font-size: 14px; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; }
  .kids-nav-dots {
    display: flex; gap: 6px; justify-content: center; padding: 8px;
  }
  .kids-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(255,255,255,0.3); transition: all 0.3s;
  }
  .kids-dot.active { background: #fff; width: 20px; border-radius: 2px; }

  .kids-content { flex: 1; overflow: hidden; position: relative; }
  .kids-card-container {
    display: flex; transition: transform 0.3s ease; height: 100%;
  }
  .kids-card {
    flex: 0 0 100%; padding: 16px;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; overflow-y: auto;
  }
  .kids-card-inner {
    background: #fff; padding: 24px 20px;
    width: 100%; max-width: 400px; text-align: center;
  }
  .kids-card-title {
    font-size: 16px; font-weight: 900; margin-bottom: 16px;
    letter-spacing: 1px; text-transform: uppercase;
  }
  .kids-card-body { text-align: left; }
  .kids-item {
    padding: 10px 14px; margin-bottom: 8px;
    font-size: 14px; line-height: 1.6; border-left: 3px solid;
  }
  .kids-item-good { background: var(--green-bg); border-color: var(--green); }
  .kids-item-improve { background: var(--orange-bg); border-color: var(--orange); }
  .kids-item-challenge { background: #f5f5f5; border-color: #000; }
  .kids-stat-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px;
  }
  .kids-stat {
    background: #f5f5f5; padding: 16px; text-align: center;
  }
  .kids-stat-num { font-size: 32px; font-weight: 900; }
  .kids-stat-label { font-size: 10px; color: var(--text-sub); font-weight: 700; margin-top: 4px; letter-spacing: 1px; text-transform: uppercase; }

  .kids-nav-arrows {
    display: flex; justify-content: space-between; padding: 12px 16px; gap: 12px;
  }
  .kids-arrow {
    flex: 1; padding: 14px; border: none; border-radius: 2px;
    background: rgba(255,255,255,0.15); color: #fff;
    font-size: 13px; font-weight: 700; cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif; letter-spacing: 1px;
  }
  .kids-arrow:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ===== BOTTOM NAV ===== */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: var(--nav-height); z-index: 100;
    background: #fff; border-top: 1px solid var(--border);
    display: flex;
  }
  .nav-item {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 3px;
    cursor: pointer; font-size: 9px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    color: var(--text-light);
    border: none; background: none; font-family: 'Noto Sans JP', sans-serif;
    -webkit-tap-highlight-color: transparent;
  }
  .nav-item.active { color: #000; }
  .nav-dot {
    width: 5px; height: 5px; border-radius: 50%; background: transparent;
  }
  .nav-item.active .nav-dot { background: #000; }
</style>
</head>
<body>

<!-- ===== HEADER ===== -->
<header>
  <div class="logo">SOCCER NOTE<small>observation memo</small></div>
  <div class="header-right">
    <button class="btn-reload" onclick="loadData()">RELOAD</button>
    <span class="ver">V1.5</span>
  </div>
</header>

<!-- ===== MAIN ===== -->
<main>
  <!-- TOP -->
  <div id="section-top" class="section active">
    <div class="section-title">Top</div>
    <div class="sub-tabs">
      <button class="sub-tab active" data-subtab="timeline" onclick="showSubTab('timeline')">時系列</button>
      <button class="sub-tab" data-subtab="theme" onclick="showSubTab('theme')">テーマ別</button>
      <button class="sub-tab" data-subtab="repeat" onclick="showSubTab('repeat')">振り返り</button>
    </div>
    <!-- 時系列 sub-tab -->
    <div id="subtab-timeline" class="subtab-content">
      <div class="filter-row" id="typeFilter"></div>
      <div id="timelineList"></div>
    </div>
    <!-- テーマ別 sub-tab -->
    <div id="subtab-theme" class="subtab-content" style="display:none;"></div>
    <!-- 振り返り sub-tab -->
    <div id="subtab-repeat" class="subtab-content" style="display:none;"></div>
  </div>

  <!-- RECORD -->
  <div id="section-record" class="section">
    <div class="section-title">Record</div>
    <div class="card">
      <div class="form-group">
        <label class="form-label">Date</label>
        <input type="date" id="entryDate" class="form-input">
      </div>
      <div class="form-group">
        <label class="form-label">Title</label>
        <input type="text" id="entryTitle" class="form-input" placeholder="対戦相手・練習内容など">
      </div>
      <div class="form-group">
        <label class="form-label">Type</label>
        <div class="type-selector">
          <div class="type-option selected" data-type="game" onclick="selectType('game')">
            <span class="type-option-label">Game</span>
          </div>
          <div class="type-option" data-type="practice" onclick="selectType('practice')">
            <span class="type-option-label">Practice</span>
          </div>
          <div class="type-option" data-type="school" onclick="selectType('school')">
            <span class="type-option-label">School</span>
          </div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Note</label>
        <textarea id="entryNote" class="form-textarea" placeholder="全体的な感想など..." rows="3"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Items</label>
        <div class="items-form" id="itemsForm"></div>
        <button class="btn-add-item" onclick="addItemRow()">+ ADD ITEM</button>
      </div>
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="clearForm()">CLEAR</button>
        <button class="btn btn-primary" onclick="saveEntry()">SAVE</button>
      </div>
      <div id="editEntryId" style="display:none;"></div>
    </div>
  </div>

  <!-- SETTINGS -->
  <div id="section-settings" class="section">
    <div class="section-title">Settings</div>
    <div class="card">
      <div class="setting-item">
        <div>
          <div class="setting-label">テーマ管理</div>
          <div class="setting-desc">テーマの追加・編集</div>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="openThemeManager()">管理</button>
      </div>
      <div class="setting-item">
        <div>
          <div class="setting-label">データ再読み込み</div>

<script>
// ===== CONFIG =====
const VERSION = '1.5';
const CACHE_KEY = 'soccer-note-cache';
const GAS_URL_KEY = 'soccer-note-gas-url';
const DEFAULT_GAS_URL = 'https://script.google.com/macros/s/AKfycbyDVM3XxUXACn0Lk2WabnLTggkt_ZUITgian7Dk3VLyQfDjyaJMLas06ogSmHSAuAkiaA/exec';
const TYPE_LABELS = { game: 'Game', practice: 'Practice', school: 'School' };
const TYPE_CLASSES = { game: 'type-game', practice: 'type-practice', school: 'type-school' };
const TAG_LABELS = { good: '良い', improve: '改善' };

// Theme name → CSS class mapping
const THEME_CSS = {
  'パス': 'theme-pass', 'シュート': 'theme-shoot', '守備': 'theme-defense',
  'ポジショニング': 'theme-position', 'ドリブル': 'theme-dribble',
  'トラップ': 'theme-trap', 'メンタル': 'theme-mental',
  'スローイン': 'theme-throwin', '切り替え': 'theme-switch',
  'フィジカル': 'theme-physical'
};

function getThemeClass(name) {
  return THEME_CSS[name] || 'theme-other';
}

// ===== STATE =====
let state = { entries: [], items: [], themes: [] };
let currentFilter = 'all';
let currentSubTab = 'timeline';
let editingEntryId = null;
let kidsPage = 0;
let kidsPages = [];

// ===== INIT =====
function init() {
  document.getElementById('entryDate').value = new Date().toISOString().slice(0, 10);
  loadFromCache();
  renderAll();
  addItemRow();
  updateGasUrlDisplay();
  setTimeout(loadData, 300);
}

// ===== GAS URL =====
function getGasUrl() {
  return localStorage.getItem(GAS_URL_KEY) || DEFAULT_GAS_URL;
}
function openGasUrlModal() {
  document.getElementById('gasUrlInput').value = getGasUrl();
  document.getElementById('gasUrlOverlay').classList.add('show');
}
function closeGasUrlModal() {
  document.getElementById('gasUrlOverlay').classList.remove('show');
}
function saveGasUrl() {
  const url = document.getElementById('gasUrlInput').value.trim();
  localStorage.setItem(GAS_URL_KEY, url);
  updateGasUrlDisplay();
  closeGasUrlModal();
  showToast('GAS URLを保存しました');
  loadData();
}
function updateGasUrlDisplay() {
  const url = getGasUrl();
  document.getElementById('gasUrlDisplay').textContent = url ? url.slice(0, 50) + '...' : '未設定';
}

// ===== API =====
async function gasRequest(body) {
  const url = getGasUrl();
  if (!url) return null;
  const timeout = new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), 15000));
  try {
    const res = await Promise.race([
      fetch(url, { method: 'POST', body: JSON.stringify(body) }),
      timeout
    ]);
    return await res.json();
  } catch (e) {
    try {
      const res = await Promise.race([
        fetch(url + '?action=' + (body.action || 'getAll')),
        new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 15000))
      ]);
      return await res.json();
    } catch (e2) {
      return null;
    }
  }
}

async function loadData() {
  showToast('読み込み中...');
  const data = await gasRequest({ action: 'getAll' });
  if (data && !data.error) {
    state.entries = Array.isArray(data.entries) ? data.entries : [];
    state.items = Array.isArray(data.items) ? data.items : [];
    state.themes = Array.isArray(data.themes) ? data.themes : [];
    saveToCache();
    renderAll();
    showToast('更新しました');
  } else {
    showToast(getGasUrl() ? '通信できませんでした' : 'GAS URLを設定してください');
  }
}

// ===== CACHE =====
function saveToCache() {
  try { localStorage.setItem(CACHE_KEY, JSON.stringify(state)); } catch (e) {}
}
function loadFromCache() {
  try {
    const d = JSON.parse(localStorage.getItem(CACHE_KEY));
    if (d) {
      state.entries = d.entries || [];
      state.items = d.items || [];
      state.themes = d.themes || [];
    }
  } catch (e) {}
}
function clearCache() {
  localStorage.removeItem(CACHE_KEY);
  showToast('キャッシュをクリアしました');
}

// ===== TABS =====
function showTab(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(t => t.classList.remove('active'));
  document.getElementById('section-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  if (name === 'top') renderSubTabContent();
}

function showSubTab(name) {
  currentSubTab = name;
  document.querySelectorAll('.sub-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.subtab-content').forEach(c => c.style.display = 'none');
  document.querySelector(`.sub-tab[data-subtab="${name}"]`).classList.add('active');
  document.getElementById('subtab-' + name).style.display = 'block';
  renderSubTabContent();
}

function renderSubTabContent() {
  if (currentSubTab === 'timeline') renderTimeline();
  else if (currentSubTab === 'theme') renderThemeReview();
  else if (currentSubTab === 'repeat') renderRepeatDetection();
}

// ===== RENDER ALL =====
function renderAll() {
  renderTimeline();
  renderTypeFilter();
}

// ===== TYPE FILTER =====
function renderTypeFilter() {
  const counts = { all: state.entries.length };
  state.entries.forEach(e => { counts[e.type] = (counts[e.type] || 0) + 1; });
  const container = document.getElementById('typeFilter');
  const filters = [
    { key: 'all', label: 'ALL' },
    { key: 'game', label: 'GAME' },
    { key: 'practice', label: 'PRACTICE' },
    { key: 'school', label: 'SCHOOL' },
  ];
  container.innerHTML = filters.map(f =>
    `<button class="filter-btn ${currentFilter === f.key ? 'active' : ''}" onclick="setFilter('${f.key}')">${f.label} (${counts[f.key] || 0})</button>`
  ).join('');
}

function setFilter(f) {
  currentFilter = f;
  renderTypeFilter();
  renderTimeline();
}

// ===== TIMELINE =====
function renderTimeline() {
  const container = document.getElementById('timelineList');
  let entries = [...state.entries].sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  if (currentFilter !== 'all') entries = entries.filter(e => e.type === currentFilter);

  if (!entries.length) {
    container.innerHTML = '<div class="empty-state"><p>まだメモがありません<br>「Record」タブから最初のメモを追加しましょう</p></div>';
    return;
  }

  container.innerHTML = entries.map(entry => {
    const entryItems = state.items.filter(it => String(it.entryId) === String(entry.id));
    const typeClass = TYPE_CLASSES[entry.type] || 'type-game';
    const typeLabel = TYPE_LABELS[entry.type] || entry.type;
    const dateStr = formatDate(entry.date);

    let itemsHtml = '';
    if (entryItems.length) {
      itemsHtml = '<div class="item-list">' + entryItems.sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0)).map(it => {
        const tagClass = 'tag-' + (it.tag || 'good');
        const tagLabel = TAG_LABELS[it.tag] || it.tag || '良い';
        const themes = (it.theme || '').split(',').filter(Boolean);
        const themesHtml = themes.map(t => `<span class="theme-chip ${getThemeClass(t)}">${escHtml(t)}</span>`).join('');
        return `<div class="item-row ${tagClass}"><span class="item-tag">${tagLabel}</span><div>${escHtml(it.text)} ${themesHtml}</div></div>`;
      }).join('') + '</div>';
    }

    const noteHtml = entry.note ? `<div class="card-note">${escHtml(entry.note)}</div>` : '';

    return `<div class="card-entry" onclick="openEntryDetail('${entry.id}')">
      <div class="card-header">
        <span class="card-date">${dateStr}</span>
        <span class="card-type ${typeClass}">${typeLabel}</span>
      </div>
      <div class="card-title">${escHtml(entry.title) || '（タイトルなし）'}</div>
      ${noteHtml}${itemsHtml}
    </div>`;
  }).join('');
}

// ===== ENTRY DETAIL =====
function openEntryDetail(id) {
  const entry = state.entries.find(e => String(e.id) === String(id));
  if (!entry) return;
  editingEntryId = id;
  const items = state.items.filter(it => String(it.entryId) === String(id));

  document.getElementById('entryModalTitle').textContent = entry.title || '（タイトルなし）';
  let html = `<div style="margin-bottom:12px;">
    <span class="card-type ${TYPE_CLASSES[entry.type] || ''}">${TYPE_LABELS[entry.type] || entry.type}</span>
    <span class="card-date" style="margin-left:8px;">${formatDate(entry.date)}</span>
  </div>`;
  if (entry.note) html += `<div class="card-note">${escHtml(entry.note)}</div>`;
  if (items.length) {
    html += '<div class="item-list" style="margin-top:12px;">' + items.sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0)).map(it => {
      const tagClass = 'tag-' + (it.tag || 'good');
      const tagLabel = TAG_LABELS[it.tag] || it.tag;
      const themes = (it.theme || '').split(',').filter(Boolean);
      const themesHtml = themes.map(t => `<span class="theme-chip ${getThemeClass(t)}">${escHtml(t)}</span>`).join('');
      return `<div class="item-row ${tagClass}"><span class="item-tag">${tagLabel}</span><div>${escHtml(it.text)} ${themesHtml}</div></div>`;
    }).join('') + '</div>';
  }
  document.getElementById('entryModalBody').innerHTML = html;
  document.getElementById('entryOverlay').classList.add('show');
}

function closeEntryModal() {
  document.getElementById('entryOverlay').classList.remove('show');
}

function editEntry() {
  if (!editingEntryId) return;
  const entry = state.entries.find(e => String(e.id) === String(editingEntryId));
  if (!entry) return;
  closeEntryModal();
  showTab('record');

  document.getElementById('entryDate').value = toDateStr(entry.date);
  document.getElementById('entryTitle').value = entry.title || '';
  document.getElementById('entryNote').value = entry.note || '';
  document.getElementById('editEntryId').textContent = entry.id;
  selectType(entry.type || 'game');

  const items = state.items.filter(it => String(it.entryId) === String(entry.id));
  document.getElementById('itemsForm').innerHTML = '';
  if (items.length) {
    items.sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0)).forEach(it => {
      addItemRow(it);
    });
  } else {
    addItemRow();
  }
}

async function deleteEntry() {
  if (!editingEntryId) return;
  if (!confirm('このメモを削除しますか？')) return;
  const id = editingEntryId;
  state.entries = state.entries.filter(e => String(e.id) !== String(id));
  state.items = state.items.filter(it => String(it.entryId) !== String(id));
  saveToCache();
  renderAll();
  closeEntryModal();
  showToast('削除しました');
  gasRequest({ action: 'deleteEntry', id });
}

// ===== RECORD FORM =====
function selectType(type) {
  document.querySelectorAll('.type-option').forEach(el => {
    el.classList.toggle('selected', el.dataset.type === type);
  });
}

function getSelectedType() {
  const el = document.querySelector('.type-option.selected');
  return el ? el.dataset.type : 'game';
}

function addItemRow(data) {
  const container = document.getElementById('itemsForm');
  const div = document.createElement('div');
  div.className = 'item-form-row';
  div.dataset.itemId = (data && data.id) || '';

  const currentTag = (data && data.tag === 'good') ? 'good' : 'improve';
  const themes = state.themes.length ? state.themes : [];
  const selectedThemes = data ? (data.theme || '').split(',').filter(Boolean) : [];
  const themeBtns = themes.sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0)).map(t =>
    `<button type="button" class="theme-toggle ${selectedThemes.includes(t.name) ? 'selected' : ''}" data-theme="${escAttr(t.name)}" onclick="this.classList.toggle('selected')">${escHtml(t.name)}</button>`
  ).join('');

  div.innerHTML = `<div class="item-form-main">
    <textarea class="item-form-text" placeholder="観察メモ..." rows="1" oninput="autoResize(this)">${escHtml(data ? data.text || '' : '')}</textarea>
    <div class="item-form-meta">
      <div class="tag-toggle-group">
        <button type="button" class="tag-toggle ${currentTag === 'good' ? 'active-good' : ''}" data-tag="good" onclick="toggleTag(this)">良い</button>
        <button type="button" class="tag-toggle ${currentTag !== 'good' ? 'active-improve' : ''}" data-tag="improve" onclick="toggleTag(this)">改善</button>
      </div>
      ${themeBtns}
    </div>
  </div>
  <button class="btn-remove-item" onclick="this.parentElement.remove()">×</button>`;
  container.appendChild(div);

  const textarea = div.querySelector('.item-form-text');
  setTimeout(() => autoResize(textarea), 0);
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

function toggleTag(btn) {
  const group = btn.parentElement;
  group.querySelectorAll('.tag-toggle').forEach(b => {
    b.className = 'tag-toggle';
  });
  btn.classList.add(btn.dataset.tag === 'good' ? 'active-good' : 'active-improve');
}

function clearForm() {
  document.getElementById('entryDate').value = new Date().toISOString().slice(0, 10);
  document.getElementById('entryTitle').value = '';
  document.getElementById('entryNote').value = '';
  document.getElementById('editEntryId').textContent = '';
  selectType('game');
  document.getElementById('itemsForm').innerHTML = '';
  addItemRow();
  editingEntryId = null;
}

async function saveEntry() {
  const date = document.getElementById('entryDate').value;
  const title = document.getElementById('entryTitle').value.trim();
  if (!date) { showToast('日付を入力してください'); return; }

  const existingId = document.getElementById('editEntryId').textContent;
  const entryId = existingId || String(Date.now());
  const now = new Date().toISOString();

  const entry = {
    id: entryId, date, title: title || '（タイトルなし）',
    type: getSelectedType(), note: document.getElementById('entryNote').value.trim(),
    createdAt: existingId ? (state.entries.find(e => e.id === existingId) || {}).createdAt || now : now
  };

  const itemRows = document.querySelectorAll('#itemsForm .item-form-row');
  const items = [];
  itemRows.forEach((row, i) => {
    const text = row.querySelector('.item-form-text').value.trim();
    if (!text) return;
    const activeTag = row.querySelector('.tag-toggle.active-good');
    const tag = activeTag ? 'good' : 'improve';
    const selectedThemes = Array.from(row.querySelectorAll('.theme-toggle.selected')).map(b => b.dataset.theme);
    items.push({
      id: row.dataset.itemId || String(Date.now() + i + 1),
      entryId: entryId, text, tag,
      theme: selectedThemes.join(','),
      sortOrder: i
    });
  });

  if (existingId) {
    const idx = state.entries.findIndex(e => String(e.id) === String(existingId));
    if (idx >= 0) state.entries[idx] = entry;
    state.items = state.items.filter(it => String(it.entryId) !== String(existingId));
  } else {
    state.entries.push(entry);
  }
  state.items.push(...items);
  saveToCache();
  renderAll();

  clearForm();
  showTab('top');
  showToast('保存しました');

  await gasRequest({ action: 'bulkSaveEntry', entry, items });
}

// ===== REVIEW: THEME =====
function renderThemeReview() {
  const container = document.getElementById('subtab-theme');
  if (!state.items.length) {
    container.innerHTML = '<div class="empty-state"><p>まだ観察データがありません</p></div>';
    return;
  }

  const themeMap = {};
  state.items.forEach(it => {
    const themes = (it.theme || '').split(',').filter(Boolean);
    if (!themes.length) themes.push('未分類');
    themes.forEach(t => {
      if (!themeMap[t]) themeMap[t] = [];
      themeMap[t].push(it);
    });
  });

  const themeOrder = {};
  state.themes.forEach(t => { themeOrder[t.name] = t.sortOrder || 99; });
  const sortedThemes = Object.keys(themeMap).sort((a, b) => (themeOrder[a] || 99) - (themeOrder[b] || 99));

  let html = '<div class="theme-bar-container">';
  const maxCount = Math.max(...sortedThemes.map(t => themeMap[t].length));
  sortedThemes.forEach(t => {
    const items = themeMap[t];
    const good = items.filter(i => i.tag === 'good').length;
    const improve = items.filter(i => i.tag === 'improve' || i.tag === 'drill').length;
    const total = items.length;
    const pct = (v) => (v / maxCount * 100).toFixed(1);
    html += `<div class="theme-bar-row">
      <span class="theme-bar-label"><span class="theme-chip ${getThemeClass(t)}" style="font-size:10px;">${escHtml(t)}</span></span>
      <div class="theme-bar-track">
        <div class="theme-bar-good" style="width:${pct(good)}%"></div>
        <div class="theme-bar-improve" style="width:${pct(improve)}%"></div>
      </div>
      <span class="theme-bar-count">${total}</span>
    </div>`;
  });
  html += '</div>';

  html += '<div style="display:flex;gap:12px;margin:12px 0 16px;font-size:11px;color:var(--text-sub);">';
  html += '<span><span style="display:inline-block;width:10px;height:10px;background:var(--green);vertical-align:middle;"></span> 良い</span>';
  html += '<span><span style="display:inline-block;width:10px;height:10px;background:var(--orange);vertical-align:middle;"></span> 改善</span>';
  html += '</div>';

  sortedThemes.forEach(t => {
    const items = themeMap[t];
    html += `<div class="theme-section">
      <div class="theme-header">
        <span class="theme-chip ${getThemeClass(t)}" style="font-size:11px;padding:2px 10px;">${escHtml(t)}</span>
        <span class="theme-count">${items.length}件</span>
      </div>
      <div class="item-list">`;
    items.sort((a, b) => {
      const ea = state.entries.find(e => String(e.id) === String(a.entryId));
      const eb = state.entries.find(e => String(e.id) === String(b.entryId));
      return ((eb && eb.date) || '').localeCompare((ea && ea.date) || '');
    }).slice(0, 10).forEach(it => {
      const entry = state.entries.find(e => String(e.id) === String(it.entryId));
      const dateStr = entry ? formatDateShort(entry.date) : '';
      const tagClass = 'tag-' + (it.tag || 'good');
      html += `<div class="item-row ${tagClass}"><span class="item-tag">${TAG_LABELS[it.tag] || it.tag}</span><div>${escHtml(it.text)}<div style="font-size:10px;color:var(--text-light);margin-top:2px;">${dateStr} ${entry ? escHtml(entry.title || '') : ''}</div></div></div>`;
    });
    html += '</div></div>';
  });

  container.innerHTML = html;
}

// ===== REVIEW: REPEAT =====
function renderRepeatDetection() {
  const container = document.getElementById('subtab-repeat');
  if (!state.items.length) {
    container.innerHTML = '<div class="empty-state"><p>まだ観察データがありません</p></div>';
    return;
  }

  const improveItems = state.items.filter(it => it.tag === 'improve' || it.tag === 'drill');
  const textCounts = {};
  improveItems.forEach(it => {
    const key = normalizeText(it.text);
    if (!textCounts[key]) textCounts[key] = { text: it.text, dates: [], items: [] };
    const entry = state.entries.find(e => String(e.id) === String(it.entryId));
    if (entry) textCounts[key].dates.push(entry.date);
    textCounts[key].items.push(it);
  });

  const themeRepeats = {};
  improveItems.forEach(it => {
    const themes = (it.theme || '').split(',').filter(Boolean);
    themes.forEach(t => {
      if (!themeRepeats[t]) themeRepeats[t] = [];
      themeRepeats[t].push(it);
    });
  });

  let html = '<div style="font-size:12px;font-weight:900;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;">同じ改善点の繰り返し</div>';

  const repeats = Object.values(textCounts).filter(v => v.dates.length >= 2)
    .sort((a, b) => b.dates.length - a.dates.length);

  if (repeats.length) {
    repeats.forEach(r => {
      const dates = [...new Set(r.dates)].sort().reverse();
      html += `<div class="repeat-card">
        <div class="repeat-count">${r.dates.length}回 REPEAT</div>
        <div class="repeat-text">${escHtml(r.text)}</div>
        <div class="repeat-dates">${dates.map(formatDateShort).join(', ')}</div>
      </div>`;
    });
  } else {
    html += '<p style="font-size:13px;color:var(--text-sub);padding:12px 0;">繰り返されている改善点はまだ検出されていません</p>';
  }

  html += '<div style="font-size:12px;font-weight:900;letter-spacing:2px;text-transform:uppercase;margin:24px 0 12px;">テーマ別の改善点数</div>';
  const sortedThemeRepeats = Object.entries(themeRepeats)
    .sort((a, b) => b[1].length - a[1].length);

  if (sortedThemeRepeats.length) {
    sortedThemeRepeats.forEach(([theme, items]) => {
      html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);">
        <span class="theme-chip ${getThemeClass(theme)}" style="font-size:11px;padding:2px 10px;">${escHtml(theme)}</span>
        <span style="font-size:13px;color:var(--orange);font-weight:700;">${items.length}件</span>
      </div>`;
    });
  } else {
    html += '<p style="font-size:13px;color:var(--text-sub);padding:12px 0;">テーマ付きの改善点がありません</p>';
  }

  container.innerHTML = html;
}

// ===== KIDS REVIEW =====
function openKidsReview() {
  buildKidsPages();
  kidsPage = 0;
  renderKidsPage();
  document.getElementById('kidsOverlay').classList.add('show');
}

function closeKidsReview() {
  document.getElementById('kidsOverlay').classList.remove('show');
}

function buildKidsPages() {
  kidsPages = [];

  const recentGood = state.items.filter(i => i.tag === 'good')
    .map(i => ({ ...i, entry: state.entries.find(e => String(e.id) === String(i.entryId)) }))
    .filter(i => i.entry)
    .sort((a, b) => (b.entry.date || '').localeCompare(a.entry.date || ''))
    .slice(0, 5);

  kidsPages.push({
    title: 'HIGHLIGHTS', body: recentGood.length
      ? recentGood.map(i => `<div class="kids-item kids-item-good">${escHtml(i.text)}<div style="font-size:11px;color:var(--text-sub);margin-top:4px;">${formatDateShort(i.entry.date)}</div></div>`).join('')
      : '<p style="color:var(--text-sub);">まだデータがありません</p>'
  });

  const growthItems = findGrowthPoints();
  kidsPages.push({
    title: 'GROWTH', body: growthItems.length
      ? growthItems.map(g => `<div class="kids-item kids-item-good" style="margin-bottom:10px;">
          <div style="font-weight:700;margin-bottom:6px;"><span class="theme-chip ${getThemeClass(g.theme)}">${escHtml(g.theme)}</span></div>
          <div style="font-size:12px;color:var(--text-sub);text-decoration:line-through;margin-bottom:4px;">${escHtml(g.before)}</div>
          <div style="font-size:14px;">→ ${escHtml(g.after)}</div>
        </div>`).join('')
      : '<p style="color:var(--text-sub);">まだ成長データが蓄積されていません<br>記録を続けると成長が見えてきます</p>'
  });

  const recentImprove = state.items.filter(i => i.tag === 'improve')
    .map(i => ({ ...i, entry: state.entries.find(e => String(e.id) === String(i.entryId)) }))
    .filter(i => i.entry)
    .sort((a, b) => (b.entry.date || '').localeCompare(a.entry.date || ''))
    .slice(0, 5);

  kidsPages.push({
    title: 'NEXT CHALLENGE', body: recentImprove.length
      ? recentImprove.map(i => `<div class="kids-item kids-item-challenge">${positiveReframe(i.text)}</div>`).join('')
      : '<p style="color:var(--text-sub);">改善ポイントがまだありません</p>'
  });

  const themeSummary = {};
  state.items.forEach(it => {
    const themes = (it.theme || '').split(',').filter(Boolean);
    themes.forEach(t => {
      if (!themeSummary[t]) themeSummary[t] = 0;
      themeSummary[t]++;
    });
  });
  const sortedSummary = Object.entries(themeSummary).sort((a, b) => b[1] - a[1]).slice(0, 6);

  kidsPages.push({
    title: 'THEME SUMMARY', body: sortedSummary.length
      ? '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">' +
        sortedSummary.map(([t, c]) =>
          `<div style="background:#f5f5f5;padding:14px;text-align:center;">
            <div><span class="theme-chip ${getThemeClass(t)}" style="font-size:11px;padding:2px 10px;">${escHtml(t)}</span></div>
            <div style="font-size:24px;font-weight:900;margin-top:8px;">${c}</div>
          </div>`
        ).join('') + '</div>'
      : '<p style="color:var(--text-sub);">テーマデータがありません</p>'
  });

  const totalEntries = state.entries.length;
  const totalItems = state.items.length;
  const goodCount = state.items.filter(i => i.tag === 'good').length;
  const improveCount = state.items.filter(i => i.tag === 'improve' || i.tag === 'drill').length;

  kidsPages.push({
    title: 'STATS', body: `<div class="kids-stat-grid">
      <div class="kids-stat"><div class="kids-stat-num">${totalEntries}</div><div class="kids-stat-label">Records</div></div>
      <div class="kids-stat"><div class="kids-stat-num">${totalItems}</div><div class="kids-stat-label">Points</div></div>
      <div class="kids-stat"><div class="kids-stat-num">${goodCount}</div><div class="kids-stat-label">Good</div></div>
      <div class="kids-stat"><div class="kids-stat-num">${improveCount}</div><div class="kids-stat-label">Challenge</div></div>
    </div>`
  });
}

function findGrowthPoints() {
  const results = [];
  const themeItems = {};
  state.items.forEach(it => {
    const themes = (it.theme || '').split(',').filter(Boolean);
    const entry = state.entries.find(e => String(e.id) === String(it.entryId));
    if (!entry) return;
    themes.forEach(t => {
      if (!themeItems[t]) themeItems[t] = [];
      themeItems[t].push({ ...it, date: entry.date });
    });
  });

  Object.entries(themeItems).forEach(([theme, items]) => {
    items.sort((a, b) => (a.date || '').localeCompare(b.date || ''));
    const improves = items.filter(i => i.tag === 'improve');
    const goods = items.filter(i => i.tag === 'good');
    improves.forEach(imp => {
      const laterGood = goods.find(g => g.date > imp.date);
      if (laterGood) {
        if (!results.find(r => r.theme === theme && r.before === imp.text)) {
          results.push({ theme, before: imp.text, after: laterGood.text });
        }
      }
    });
  });
  return results.slice(0, 5);
}

function positiveReframe(text) {
  const reframes = [
    [/できなかった/g, 'チャレンジ中の'],
    [/弱い/g, 'もっと強くなれる'],
    [/遅い/g, 'スピードアップ目標'],
    [/ミスが多い/g, '練習で上達できる'],
    [/ない$/g, 'ようになろう！'],
  ];
  let result = text;
  reframes.forEach(([pat, rep]) => { result = result.replace(pat, rep); });
  if (result === text) result = '「' + text + '」を頑張ろう！';
  return result;
}

function renderKidsPage() {
  const dotsHtml = kidsPages.map((_, i) =>
    `<div class="kids-dot ${i === kidsPage ? 'active' : ''}"></div>`
  ).join('');
  document.getElementById('kidsDots').innerHTML = dotsHtml;

  document.getElementById('kidsCards').innerHTML = kidsPages.map(p =>
    `<div class="kids-card"><div class="kids-card-inner">
      <div class="kids-card-title">${p.title}</div>
      <div class="kids-card-body">${p.body}</div>
    </div></div>`
  ).join('');

  document.getElementById('kidsCards').style.transform = `translateX(-${kidsPage * 100}%)`;
  document.getElementById('kidsPrev').disabled = kidsPage === 0;
  document.getElementById('kidsNext').disabled = kidsPage === kidsPages.length - 1;
}

function kidsNav(dir) {
  kidsPage = Math.max(0, Math.min(kidsPages.length - 1, kidsPage + dir));
  renderKidsPage();
}

// ===== THEME MANAGER =====
function openThemeManager() {
  renderThemeList();
  document.getElementById('themeOverlay').classList.add('show');
}
function closeThemeManager() {
  document.getElementById('themeOverlay').classList.remove('show');
}
function renderThemeList() {
  const container = document.getElementById('themeList');
  const sorted = [...state.themes].sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0));
  container.innerHTML = sorted.map(t =>
    `<div class="setting-item" style="gap:8px;">
      <span class="theme-chip ${getThemeClass(t.name)}" style="font-size:11px;padding:3px 10px;">${escHtml(t.name)}</span>
      <input type="text" class="form-input" style="flex:1;padding:6px;" value="${escAttr(t.name)}" data-id="${t.id}" data-field="name" onchange="updateThemeField(this)">
      <button class="btn btn-ghost btn-sm" style="color:var(--orange);flex-shrink:0;" onclick="deleteTheme('${t.id}')">削除</button>
    </div>`
  ).join('');
}

function updateThemeField(el) {
  const id = el.dataset.id;
  const field = el.dataset.field;
  const value = el.value.trim();
  const theme = state.themes.find(t => String(t.id) === String(id));
  if (!theme) return;
  theme[field] = value;
  saveToCache();
  gasRequest({ action: 'saveTheme', ...theme });
  showToast('更新しました');
}

async function deleteTheme(id) {
  if (!confirm('このテーマを削除しますか？')) return;
  state.themes = state.themes.filter(t => String(t.id) !== String(id));
  saveToCache();
  renderThemeList();
  showToast('削除しました');
  gasRequest({ action: 'deleteTheme', id });
}

async function addTheme() {
  const name = document.getElementById('newThemeName').value.trim();
  if (!name) { showToast('テーマ名を入力してください'); return; }
  const maxOrder = state.themes.reduce((m, t) => Math.max(m, t.sortOrder || 0), 0);
  const theme = { id: String(Date.now()), name, icon: '', sortOrder: maxOrder + 1 };
  state.themes.push(theme);
  saveToCache();
  renderThemeList();
  document.getElementById('newThemeName').value = '';
  showToast('テーマを追加しました');
  gasRequest({ action: 'saveTheme', ...theme });
}

// ===== HELPERS =====
function toDateStr(d) {
  if (!d) return '';
  const m = String(d).match(/^(\d{4})-(\d{2})-(\d{2})/);
  return m ? `${m[1]}-${m[2]}-${m[3]}` : '';
}

function parseDate(d) {
  if (!d) return null;
  const s = String(d);
  const m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (m) return new Date(parseInt(m[1]), parseInt(m[2]) - 1, parseInt(m[3]));
  const dt = new Date(s);
  return isNaN(dt) ? null : dt;
}

function formatDate(d) {
  const dt = parseDate(d);
  if (!dt) return '';
  const wd = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'][dt.getDay()];
  return `${dt.getFullYear()}.${dt.getMonth() + 1}.${dt.getDate()} ${wd}`;
}

function formatDateShort(d) {
  const dt = parseDate(d);
  if (!dt) return '';
  return `${dt.getMonth() + 1}/${dt.getDate()}`;
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function escAttr(s) {
  if (!s) return '';
  return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function normalizeText(t) {
  return (t || '').trim().toLowerCase().replace(/[。、！？\s]+/g, '');
}

// ===== TOAST =====
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ===== OVERLAY CLOSE =====
document.querySelectorAll('.overlay').forEach(ov => {
  ov.addEventListener('click', e => { if (e.target === ov) ov.classList.remove('show'); });
});

// ===== SWIPE SUPPORT FOR KIDS =====
(function() {
  let startX = 0;
  const content = document.getElementById('kidsContent');
  content.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, { passive: true });
  content.addEventListener('touchend', e => {
    const diff = startX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 50) kidsNav(diff > 0 ? 1 : -1);
  }, { passive: true });
})();

init();
</script>
